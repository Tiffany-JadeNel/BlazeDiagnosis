name: Cloud Administration task
description: Environment, deployment, CI/CD, backup, or operations task
title: "[Cloud Admin]: "
labels: ["cloud-administration", "documentation", "needs-review"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Task goal
      description: What operational or cloud-administration outcome is required?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: List expected steps or deliverables.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: Note secrets, environment variables, access, or deployment risks.
